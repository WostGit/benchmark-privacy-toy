name: Real FHE Sentiment Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fhe-benchmark:
    runs-on: macos-14
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # Concrete-ML plays best with 3.10 or 3.11

      - name: Install Real FHE Tools
        run: |
          python -m venv fhe_env
          source fhe_env/bin/activate
          pip install --upgrade pip
          pip install concrete-ml numpy

      - name: Run Real FHE Inference
        run: |
          source fhe_env/bin/activate
          cat > real_fhe.py << 'EOF'
          import time
          import numpy as np
          from concrete.ml.models import LogisticRegression

          print("\n=== STARTING REAL FHE INFERENCE ===")

          # 1. We mock a simple 2-feature dataset (e.g., text length & positive word count)
          # In a full app, these would be extracted from a sentence.
          X = np.random.rand(100, 2)
          y = (X[:, 0] + X[:, 1] > 1).astype(int)

          # 2. Train a real model in the clear
          model = LogisticRegression(n_bits=8)
          model.fit(X, y)

          # 3. Compile the model into an actual FHE circuit!
          print("[ACTION] Compiling model into FHE cryptographic primitives...")
          model.compile(X)

          # 4. Encrypt a test input
          test_input = np.array([[0.8, 0.7]])
          print(f"[CLIENT] Encrypting data: {test_input}")
          
          # 5. Run real FHE inference
          start = time.time()
          # This line actually encrypts the data, runs it through the model, and decrypts the result
          fhe_pred = model.predict(test_input, fhe="execute")
          end = time.time()

          print(f"\n[OUTPUT] Decrypted Result: {fhe_pred}")
          print(f"[METRICS] Real FHE Execution Time: {end - start:.4f} seconds")
          print("\n=== DEMO COMPLETE ===")
          print("[CONCLUSION] You just performed a real, fully homomorphic calculation on your runner.")
          EOF
          python real_fhe.py
