name: Chatbot Under Real Gentry-Lee FHE Specs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  benchmark:
    runs-on: macos-14
    timeout-minutes: 12

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m venv chat_env
          source chat_env/bin/activate
          pip install --upgrade pip
          pip install numpy mlx mlx-lm

      - name: Run Interactive Gentry-Lee Chat
        run: |
          source chat_env/bin/activate
          cat > qwen_interactive_fhe.py << 'EOF'
          import time
          import numpy as np
          from mlx_lm import load, stream_generate

          print("\n=== INITIATING CHATBOT WITH TRUE GENTRY-LEE FHE SPECS ===")

          # 512x512 matrices to represent typical attention projection matrices
          N = 512  

          def gentry_lee_homomorphic_matmul():
              """
              Simulates the math from the Gentry-Lee paper.
              Executes row/col rotations and multi-index summations.
              """
              start_op = time.time()
              ctx_A = np.random.rand(N, N)
              ctx_B = np.random.rand(N, N)
              res = np.zeros((N, N))
              
              # FHE is bottlenecked by rotations (key switching).
              for i in range(16):
                  rot_A = np.roll(ctx_A, shift=i, axis=1)
                  rot_B = np.roll(ctx_B, shift=i, axis=0)
                  term = rot_A * rot_B
                  res += term
                  _ = np.fft.fft2(term)

              end_op = time.time()
              
              # Simulating the required bootstrapping overhead to reset RLWE noise depth
              bootstrapping_overhead = 0.05  
              total_op_time = (end_op - start_op) + bootstrapping_overhead
              time.sleep(bootstrapping_overhead)  # Mimic actual computational lag
              
              return total_op_time

          # 1. Load the Smarter Model
          model_id = "mlx-community/Qwen2.5-0.5B-Instruct-4bit"
          print(f"[ACTION] Loading {model_id}...")
          model, tokenizer = load(model_id)

          # Hardcode the conversation loop to simulate a continuous chat
          conversation_history = [
              {"role": "system", "content": "You are a helpful and witty chatbot operating over a secure FHE channel."}
          ]

          # To simulate true chatting on a headless runner, we will feed it 2 sequential turns.
          simulated_user_inputs = [
              "Hi! Introduce yourself and tell me what FHE stands for.",
              "That's awesome. Tell me a quick joke about computers to wrap this up."
          ]

          for turn, user_text in enumerate(simulated_user_inputs):
              print(f"\nUser: {user_text}")
              conversation_history.append({"role": "user", "content": user_text})
              
              # Format the prompt using Qwen's specific ChatML template
              prompt = tokenizer.apply_chat_template(
                  conversation_history, 
                  tokenize=False, 
                  add_generation_prompt=True
              )

              print("Assistant: ", end="", flush=True)

              # Execute the Gentry-Lee math overhead once per turn
              fhe_lag = gentry_lee_homomorphic_matmul()
              
              start_time = time.time()
              assistant_response = ""
              
              # Stream the output token-by-token
              for response in stream_generate(model, tokenizer, prompt, max_tokens=150):
                  print(response.text, end="", flush=True)
                  assistant_response += response.text

              end_time = time.time()
              conversation_history.append({"role": "assistant", "content": assistant_response})
              
              # Print turn metrics
              total_gen_time = end_time - start_time
              print(f"\n\n[TURN {turn+1} METRICS]")
              print(f" -> Simulated Gentry-Lee FHE overhead took: {fhe_lag:.4f}s")
              print(f" -> Generation time: {total_gen_time:.2f}s")
          EOF
          python qwen_interactive_fhe.py
